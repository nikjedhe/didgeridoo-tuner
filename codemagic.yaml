workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nikhil.didgeridootuner
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set bundle identifier
        script: |
          cd ios && /usr/libexec/PlistBuddy -c \
            "Set :CFBundleIdentifier com.nikhil.didgeridootuner" \
            Runner/Info.plist
      - name: Build iOS release
        script: |
          flutter build ios --release
    artifacts:
      - build/ios/iphoneos/Runner.app
      - "*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true